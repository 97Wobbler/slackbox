# slack-fetch-mcp 이슈 의존성 분석 (v2 — 검토 반영)
# 18개 이슈를 의존성 기반으로 정리

issues:
  # ── Layer 0: 블로커 없음 (독립적으로 수정 가능) ──

  A3:
    title: "TARGET_USER_IDS 없으면 validate 실패"
    severity: high
    blocked_by: []
    file: config.py
    fix: "validate()에서 target_user_ids 체크를 선택적으로 변경"

  C1:
    title: "days 필수 — 전체 기간 수집 불가"
    severity: high
    blocked_by: []
    file: mcp_server.py
    fix: "_since_str에서 days=0을 '전체'로 해석. MCP tool의 days 시그니처를 Optional로."

  D1:
    title: "스레드 사용자별 중복 저장 — 공유 캐시 없음"
    severity: high
    blocked_by: []
    file: threads.py, config.py
    fix: "data/raw/threads/ 공유 디렉토리로 이동. config에 shared_threads_dir 추가."

  D5:
    title: "채널 전체 대화용 저장 경로 정의 부재"
    severity: high
    blocked_by: []
    file: config.py
    fix: "channel_messages_path(channel_id) 헬퍼 추가. data/raw/channels/{id}/"

  E2:
    title: "Slack API 에러를 일반 Exception으로 처리"
    severity: medium
    blocked_by: []
    file: mcp_server.py, messages.py
    fix: "SlackApiError의 error 코드 파싱. token_revoked/missing_scope 명확 메시지."

  D3:
    title: "체크포인트 search/history 공용 — 방식 번갈아 쓰면 꼬임"
    severity: medium
    blocked_by: []
    file: messages.py
    fix: "search/history 별도 체크포인트 또는 phase별 키 분리."

  D4:
    title: "스레드 부분 쓰기 후 중단 시 불완전 파일"
    severity: medium
    blocked_by: []
    file: threads.py
    fix: "임시 파일(.tmp) 쓴 후 rename으로 원자적 저장."

  E1:
    title: "수집 중 get_collected_data 호출 시 불완전 JSON 읽기"
    severity: medium
    blocked_by: []
    file: mcp_server.py
    fix: "JSON 파싱 실패 라인 skip 처리 (try/except per line)."

  B1:
    title: "키워드 검색 tool 없음"
    severity: high
    blocked_by: []
    file: mcp_server.py
    fix: "search_messages(query, days=30) tool 추가. search.messages API를 임의 쿼리로."

  B2:
    title: "mentions가 MCP tool로 노출 안 됨"
    severity: medium
    blocked_by: []
    file: mcp_server.py
    fix: "collect_mentions 래퍼 tool 추가. user_id 파라미터 직접 수용."

  B3:
    title: "crawl_user에 스레드 자동 수집 옵션 없음"
    severity: medium
    blocked_by: []
    file: mcp_server.py
    fix: "include_threads=True 파라미터 추가. 메시지 수집 후 자동으로 collect_threads 호출."

  B4:
    title: "crawl_threads의 자동 발견 경로 없음"
    severity: medium
    blocked_by: []
    file: mcp_server.py
    fix: "user_id만 넣으면 messages.jsonl에서 자동으로 thread_ts 추출하는 모드 추가."

  E3:
    title: "디스크 용량 관리/rotation 없음"
    severity: low
    blocked_by: []
    file: cli.py
    fix: "status에 디스크 사용량 표시. 나중에 정리 명령 추가. 우선순위 낮음."

  # ── Layer 1: Layer 0에 의존 ──

  A1:
    title: "crawl_channel이 전체 대화가 아닌 대상 사용자 메시지만 수집"
    severity: high
    blocked_by: [C1]
    file: messages.py, mcp_server.py
    fix: "collect_via_history에 user_id=None이면 필터 skip. crawl_channel에서 user필터 없이 호출."

  A4:
    title: "crawl_user에 임의 user_id 전달 시 디렉토리 안 만듦"
    severity: medium
    blocked_by: [A3]
    file: messages.py, config.py
    fix: "collect_* 함수 내부에서 동적 디렉토리 생성 (makedirs)."

  D2:
    title: "search→history 순차 실행 시 messages.jsonl 중복 가능"
    severity: medium
    blocked_by: [D3]
    file: messages.py
    fix: "collect_via_history에도 기존 파일에서 seen_ts 로드 추가."

  # ── Layer 2: Layer 1에 의존 ──

  A2:
    title: "get_collected_data가 target_user_ids 경로만 읽음"
    severity: high
    blocked_by: [D5, D1]
    file: mcp_server.py
    fix: "채널 데이터(D5) + 공유 스레드(D1) 경로도 스캔하도록 확장."

  C2:
    title: "crawl_user 단일 user_id만 — 복수 사용자 일괄 수집"
    severity: low
    blocked_by: [A4]
    file: mcp_server.py
    fix: "Claude가 반복 호출 가능하므로 우선순위 낮음. 편의용 batch tool."

# ── 의존성 그래프 (수정 후) ──
#
# Layer 0 (13개, 블로커 없음):
#   A3, C1, D1, D5, E2, D3, D4, E1, B1, B2, B3, B4, E3
#
# Layer 1 (3개):
#   A1  → [C1]
#   A4  → [A3]
#   D2  → [D3]
#
# Layer 2 (2개):
#   A2  → [D5, D1]
#   C2  → [A4]
#
# 병렬 실행 최적 순서:
#   Wave 1: A3, C1, D1, D5 (high severity Layer 0)
#   Wave 2: B1, E2, D3, D4 (medium/high Layer 0)
#   Wave 3: A1, A4, D2 + B2, B3, B4, E1 (Layer 0 잔여 + Layer 1)
#   Wave 4: A2, C2 (Layer 2)
