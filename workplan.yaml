# workplan.yaml — 채널×주 이중 분할 Markdown 캐싱

meta:
  created: 2026-04-13
  spec_source: "대화에서 합의된 채널×주 Markdown 캐싱 설계"

  as_is: |
    get_collected_data MCP tool이 매번 전체 JSONL을 읽어서 Markdown 문자열로 변환해 응답.
    캐싱 없이 매번 I/O + 변환 반복. 큰 범위 요청 시 거대한 단일 문자열을 MCP 응답으로 반환하여
    Claude Code 컨텍스트를 낭비. data/cleaned/ 디렉토리는 config에 정의되어 있으나 미사용.

  to_be: |
    1. 수집 완료 시 채널×주 단위로 data/cleaned/{channel_id}_{channel_name}/{YYYY-WNN}.md 파일 자동 생성.
    2. JSONL 갱신 시 해당 채널-주만 재생성 (mtime 기반 캐시 무효화).
    3. 빈 채널-주는 파일 미생성.
    4. get_collected_data format="markdown"일 때 파일 목록+요약을 JSON으로 반환 (기존 json 모드는 유지).
    5. 각 .md 파일 상단에 <!-- AUTO-GENERATED --> 주석.
    6. python3 -c "from slack_fetch.text_cleaner import ts_to_dt" 에러 없음.


tasks:

  - id: T01
    name: "formatting.py — 채널×주 단위 Markdown 생성 함수 추가"
    blocked_by: []
    human_gate: null
    done: true
    category: feat
    spec: |
      slack_fetch/formatting.py에 새 함수 추가:

      def format_channel_week_md(messages: list[dict], channel_name: str, week_key: str,
                                  cleaner: SlackTextCleaner, tz: str) -> str:
          """단일 채널+주 조합의 메시지를 Markdown으로 변환."""

      - messages는 이미 해당 채널+주로 필터링된 상태로 전달됨
      - 파일 상단에 <!-- AUTO-GENERATED by slackbox. Do not edit. --> 주석 삽입
      - 헤더: # #{channel_name} — {week_key} ({MM/DD}~{MM/DD}) — {N}건
      - 날짜별 ## YYYY-MM-DD 소제목
      - 메시지: [{HH:MM}] {cleaned_text}  [스레드 N건] (있으면)
      - 기존 _format_channel_messages_md, _format_weekly_md는 삭제하지 않고 유지 (하위 호환)

      기존 함수의 포매팅 스타일(시간 형식, 스레드 표기 등)을 그대로 따를 것.
    output: slack_fetch/formatting.py
    verify_checks:
      - "format_channel_week_md 함수가 존재하고 import 가능"
      - "AUTO-GENERATED 주석이 출력 상단에 포함"
      - "기존 _format_channel_messages_md, _format_weekly_md 함수가 여전히 존재"

  - id: T02
    name: "md_cache.py — Markdown 캐시 생성/무효화 모듈"
    blocked_by: [T01]
    human_gate: null
    done: true
    category: feat
    spec: |
      slack_fetch/md_cache.py 신규 생성.

      핵심 함수:

      1. build_md_cache(cfg: CrawlerConfig, cleaner: SlackTextCleaner, tz: str) -> dict:
         - _load_all_messages로 전체 메시지 로드
         - 메시지를 (channel_name, week_key) 조합으로 그룹핑
           - channel_name: msg.get("channel_name", "unknown")
           - week_key: ts_to_dt(msg["ts"], tz)에서 isocalendar로 "YYYY-WNN" 생성
         - 각 그룹에 대해:
           - 디렉토리명: sanitize_dirname(channel_id, channel_name) → "{channel_id}_{channel_name}"
             - channel_name에서 특수문자는 re.sub(r'[^\w가-힣-]', '_', name) 으로 정규화
           - 대상 파일: cfg.cleaned_dir / dirname / f"{week_key}.md"
           - 캐시 무효화 체크: 소스 JSONL의 mtime vs .md 파일의 mtime 비교.
             소스가 더 새로우면 재생성, 아니면 스킵.
           - format_channel_week_md 호출 → .md 파일 write
         - 반환: { "generated": N, "skipped": N, "total_files": N }

      2. list_cached_md(cfg: CrawlerConfig) -> list[dict]:
         - cleaned_dir 하위의 모든 .md 파일 스캔
         - 각 파일에 대해 { "channel": dirname, "week": stem, "path": str, "size_kb": float } 반환
         - 경로순 정렬

      3. get_source_mtime(cfg: CrawlerConfig) -> float:
         - raw_dir 하위의 모든 JSONL 파일 중 가장 최근 mtime 반환

      config.py의 ensure_dirs에서 기존 by_channel, by_period 디렉토리 생성을 제거하고
      cleaned_dir만 보장.
    output: slack_fetch/md_cache.py
    verify_checks:
      - "md_cache.py가 존재하고 build_md_cache, list_cached_md가 import 가능"
      - "config.py의 ensure_dirs에서 by_channel, by_period 제거됨"
      - "sanitize_dirname이 특수문자를 안전하게 처리"

  - id: T03
    name: "mcp_server.py — get_collected_data markdown 모드를 캐시 기반으로 전환"
    blocked_by: [T02]
    human_gate: null
    done: true
    category: refactor
    spec: |
      slack_fetch/mcp_server.py의 get_collected_data 함수 수정:

      format="markdown"일 때 동작 변경:
      1. build_md_cache(cfg, cleaner, tz) 호출하여 캐시 갱신
      2. scope에 따라 캐시된 파일 목록 필터링:
         - "all": 전체 목록
         - "channel:<name>": 해당 채널 디렉토리의 파일만
         - "week:<YYYY-WNN>": 해당 주차 파일만 (모든 채널)
         - "recent:<N>": 최근 N일에 해당하는 주차들의 파일만
         - "search:<query>": 기존대로 검색 결과를 직접 포매팅 (캐시 미적용)
         - "summary": 기존 로직 유지
      3. 필터된 파일 목록을 JSON으로 반환:
         {
           "cache_status": { "generated": N, "skipped": N, "total_files": N },
           "files": [
             { "channel": "C123_general", "week": "2025-W22", "path": "data/cleaned/C123_general/2025-W22.md", "size_kb": 12.3 },
             ...
           ],
           "hint": "파일 내용은 Read tool로 path를 읽으세요."
         }

      format="json"일 때: 기존 동작 완전 유지 (변경 없음).

      import 추가: from slack_fetch.md_cache import build_md_cache, list_cached_md
    output: slack_fetch/mcp_server.py
    verify_checks:
      - "format='json'이 기존과 동일하게 동작"
      - "format='markdown'이 JSON 파일 목록을 반환"
      - "scope='search:*'는 캐시 미적용, 직접 포매팅"
      - "build_md_cache import가 에러 없음"

  - id: T04
    name: "수집 함수에 캐시 자동 갱신 트리거 추가"
    blocked_by: [T02]
    human_gate: null
    done: true
    category: feat
    spec: |
      mcp_server.py의 crawl_channel, crawl_user, search_messages, crawl_threads 함수에서
      수집 완료 직후 해당 채널-주의 .md 캐시를 갱신하는 로직 추가.

      전체 캐시를 rebuild하지 않고, build_md_cache를 호출하되
      mtime 비교로 변경분만 갱신되므로 전체 호출해도 무방.

      각 crawl 함수의 return 직전에 다음 추가:
        try:
            from slack_fetch.md_cache import build_md_cache
            from slack_fetch.text_cleaner import SlackTextCleaner, load_user_map_from_threads, load_channel_map
            user_map = load_user_map_from_threads(cfg)
            channel_map = load_channel_map(cfg)
            cleaner = SlackTextCleaner(user_map, channel_map)
            build_md_cache(cfg, cleaner, cfg.timezone)
        except Exception as e:
            logger.warning("MD 캐시 갱신 실패 (무시): %s", e)

      이 로직을 헬퍼 함수로 추출:
        def _refresh_md_cache(cfg: CrawlerConfig) -> None:
            ...위 로직...

      mcp_server.py 상단에 _refresh_md_cache 정의, 각 crawl 함수에서 호출.
    output: slack_fetch/mcp_server.py
    verify_checks:
      - "_refresh_md_cache 함수가 mcp_server.py에 존재"
      - "crawl_channel, crawl_user 반환 전에 _refresh_md_cache 호출 존재"
      - "try/except로 감싸져 있어 캐시 실패가 수집을 중단하지 않음"

  - id: T05
    name: "CLAUDE.md 업데이트 + 동작 검증"
    blocked_by: [T03, T04]
    human_gate: null
    done: true
    category: docs
    spec: |
      1. CLAUDE.md의 구조 섹션에 md_cache.py 추가:
         ├── md_cache.py       # Markdown 캐시 생성/무효화 (채널×주 단위)

      2. 데이터 저장 경로 섹션에 cleaned 구조 업데이트:
         data/cleaned/
         └── {channel_id}_{channel_name}/
             ├── YYYY-WNN.md    # 채널×주 단위 Markdown (AUTO-GENERATED)
             └── ...

      3. 동작 검증:
         - python3 -c "from slack_fetch.md_cache import build_md_cache, list_cached_md; print('OK')"
         - python3 -c "from slack_fetch.mcp_server import mcp; print('OK')"
         - 위 두 명령이 에러 없이 통과해야 함.
    output: CLAUDE.md
    verify_checks:
      - "CLAUDE.md에 md_cache.py 항목 존재"
      - "import 테스트 2개 모두 통과"
